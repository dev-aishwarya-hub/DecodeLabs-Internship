<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeLabs AI | Data Classification</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        :root {
            --baby-pink: #f5f180;
            --magenta: #fa4b06;
            --magenta-hover: #f76206;
            --card-bg: #ffffff;
            --text-main: #2D1B22; 
            --text-muted: #7A5C68;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--baby-pink);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.1);
            border: 2px solid rgba(255, 0, 255, 0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.7rem;
            color: var(--magenta);
            margin: 0 0 6px 0;
        }

        .header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        input {
            padding: 10px;
            border: 2px solid var(--baby-pink);
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: #FFF5F7;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--magenta);
        }

        button {
            width: 100%;
            background-color: var(--magenta);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--magenta-hover);
        }

        .results-section {
            margin-top: 25px;
            border-top: 2px solid #FFF0F3;
            padding-top: 15px;
        }

        .results-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--magenta);
            margin-bottom: 10px;
        }

        .metric-card {
            background: #FFF5F7;
            border-left: 5px solid var(--magenta);
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin-top: 10px;
        }

        .metric-score {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }
    </style>

    <py-config>
        packages = ["numpy", "pandas", "scikit-learn"]
    </py-config>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>💖 DecodeLabs Classification Engine</h1>
            <p>Project 2: Machine Learning Data Classifier</p>
        </div>

        <p style="font-size:0.9rem; font-weight:600; text-align:center; color:var(--text-muted);">
            Input test values to classify an unknown sample:
        </p>

        <div class="form-grid">
            <div class="input-group"><label>Sepal Length (cm)</label><input type="number" step="0.1" id="sl" value="5.1"></div>
            <div class="input-group"><label>Sepal Width (cm)</label><input type="number" step="0.1" id="sw" value="3.5"></div>
            <div class="input-group"><label>Petal Length (cm)</label><input type="number" step="0.1" id="pl" value="1.4"></div>
            <div class="input-group"><label>Petal Width (cm)</label><input type="number" step="0.1" id="pw" value="0.2"></div>
        </div>

        <button id="predict-btn" py-click="run_pipeline">✨ Train Model & Predict Class</button>

        <div class="results-section">
            <div class="results-title">🔮 Operational Matrix Logs</div>
            <div id="output-display">
                <p style="color: var(--text-muted); font-style: italic;">The model pipeline will execute when you click the action button...</p>
            </div>
        </div>
    </div>

    <script type="py">
        from sklearn.datasets import load_iris
        from sklearn.model_selection import train_test_split
        from sklearn.preprocessing import StandardScaler
        from sklearn.neighbors import KNeighborsClassifier
        from sklearn.metrics import accuracy_score
        from pyscript import document
        import numpy as np

        def run_pipeline(event):
            output_div = document.querySelector("#output-display")
            
            # Extract browser layout values
            try:
                sl = float(document.querySelector("#sl").value)
                sw = float(document.querySelector("#sw").value)
                pl = float(document.querySelector("#pl").value)
                pw = float(document.querySelector("#pw").value)
            except ValueError:
                output_div.innerHTML = "<p style='color: #FF00FF;'>⚠️ Please provide accurate numerical dimensions.</p>"
                return

            # Phase 1: Input Setup
            iris = load_iris()
            X, y = iris.data, iris.target

            # Phase 2: Process Setup (Structural Integrity Split)
            X_train, X_test, y_train, y_test = train_test_split(
                X, y, test_size=0.20, random_state=42, stratify=y
            )

            # Feature Balancing (The Gatekeeper Scaling Pattern)
            scaler = StandardScaler()
            X_train_scaled = scaler.fit_transform(X_train)
            X_test_scaled = scaler.transform(X_test)

            # Train the algorithm via Supervised Proximity Logic
            knn = KNeighborsClassifier(n_neighbors=3)
            knn.fit(X_train_scaled, y_train)

            # Evaluate static baseline verification metrics
            y_pred = knn.predict(X_test_scaled)
            accuracy = accuracy_score(y_test, y_pred) * 100

            # Map the unknown test sample input safely
            sample_input = np.array([[sl, sw, pl, pw]])
            sample_scaled = scaler.transform(sample_input)
            prediction_idx = knn.predict(sample_scaled)[0]
            predicted_species = iris.target_names[prediction_idx].upper()

            # Phase 3: Dynamic Interface Output Compilation
            output_div.innerHTML = f"""
                <div class="metric-card">
                    <div style="font-weight:600; color:var(--text-muted);">✨ Baseline Training Accuracy Verification:</div>
                    <div class="metric-score">{accuracy:.2f}%</div>
                </div>
                <div class="metric-card" style="margin-top:10px; border-left-color: var(--text-main);">
                    <div style="font-weight:600; color:var(--text-muted);">🎯 Calculated Target Class Classification:</div>
                    <div class="metric-score" style="color:var(--magenta);">{predicted_species}</div>
                </div>
            """
    </script>

</body>
</html>
